<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Yandex.Metrika counter -->
  <script type="text/javascript">
     (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
     m[i].l=1*new Date();

  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="robots" content="{{ page.robots }}">
  <meta name="author" content="ТЕХБИЗ">
  <link rel="canonical" href="{{ canonical_url }}">

  <link rel="icon" href="{{ asset('assets/favicon.ico') }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ asset('assets/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ asset('assets/favicon-16x16.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ asset('assets/apple-touch-icon.png') }}">
  {% if page.icon192 %}<link rel="icon" type="image/png" sizes="192x192" href="{{ asset('assets/icon-192.png') }}">{% endif %}

  {% if page.og %}
  <meta property="og:type" content="{{ page.og_type }}">
  <meta property="og:site_name" content="ТЕХБИЗ">
  <meta property="og:locale" content="ru_RU">
  <meta property="og:title" content="{{ page.og_title }}">
  <meta property="og:description" content="{{ page.og_description }}">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:image" content="{{ SITE_URL }}/assets/og-cover.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.og_title }}">
  <meta name="twitter:description" content="{{ page.og_description }}">
  <meta name="twitter:image" content="{{ SITE_URL }}/assets/og-cover.jpg">
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ asset('styles.css') }}?v={{ ASSET_VERSION }}">

  {% block extra_head %}{% endblock %}
</head>
<body>
  <a class="skip-link" href="#main">Перейти к основному контенту</a>

  {% include "_header.html" %}

  <main id="main">
    {% block content %}{% endblock %}
  </main>

  {% include "_footer.html" %}

  <script src="{{ asset('script.js') }}?v={{ ASSET_VERSION }}" defer></script>
</body>
</html>
